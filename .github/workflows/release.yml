name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to publish, for example v0.1.0
        required: true
        type: string
      release_name:
        description: Optional display name for the release
        required: false
        default: ""
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build And Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e .[dev]

      - name: Run backend tests
        working-directory: backend
        run: pytest

      - name: Build backend package
        working-directory: backend
        run: python -m build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cp backend/dist/* release-artifacts/
          tar -czf "release-artifacts/distilled-ti-frontend-${{ inputs.release_tag }}.tar.gz" \
            -C frontend \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.ts \
            README.md

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distilled-ti-${{ inputs.release_tag }}
          path: release-artifacts/*
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.release_tag }}
          files: release-artifacts/*
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
